<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sidecar Advisory | Coming Soon</title>
    <meta
      name="description"
      content="Sidecar Advisory is preparing a new website for Metro Detroit small businesses and professional service firms. Check back soon."
    />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,600&family=Epilogue:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --saddle: #2c2418;
        --parchment: #f7f3ed;
        --tan: #9c8b6e;
        --tan-light: #d4c4a8;
        --tan-dark: #5c4e38;
        --forest: #3d6b5e;
        --cream: #ede6da;
        --white: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--parchment);
        color: var(--tan-dark);
        font-family: "Epilogue", "Avenir Next", "Segoe UI", sans-serif;
      }

      .shell {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
        display: grid;
        place-items: center;
        padding: 32px 20px;
      }

      .circle-solid,
      .circle-outline {
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
      }

      .circle-solid {
        top: -180px;
        right: -140px;
        width: 420px;
        aspect-ratio: 1;
        background: var(--cream);
      }

      .circle-outline {
        left: -160px;
        bottom: -150px;
        width: 320px;
        aspect-ratio: 1;
        border: 1px solid var(--tan-light);
      }

      .card {
        position: relative;
        z-index: 1;
        width: min(100%, 760px);
        padding: 44px 32px;
        border: 1px solid var(--tan-light);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.72);
        text-align: center;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 28px;
        color: var(--saddle);
        text-decoration: none;
      }

      .brand-icon {
        width: 52px;
        height: 40px;
        stroke: var(--saddle);
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      .brand-text {
        display: grid;
        gap: 5px;
        text-align: left;
      }

      .brand-wordmark {
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: 2rem;
        font-weight: 600;
        line-height: 0.9;
      }

      .brand-tagline {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--tan);
        font-size: 10px;
        font-weight: 400;
        letter-spacing: 4px;
        line-height: 1;
      }

      .brand-rule {
        width: 42px;
        height: 1px;
        background: var(--tan-light);
      }

      .eyebrow {
        margin: 0 0 16px;
        color: var(--tan);
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 3px;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 auto 20px;
        max-width: 620px;
        color: var(--saddle);
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: clamp(3rem, 8vw, 4.5rem);
        font-weight: 600;
        line-height: 0.96;
      }

      p {
        margin: 0 auto;
        max-width: 560px;
        font-size: 1.05rem;
        line-height: 1.75;
      }

      .meta {
        margin-top: 28px;
        color: var(--tan);
        font-size: 0.92rem;
      }

      .contact-link {
        display: inline-flex;
        margin-top: 26px;
        padding-bottom: 2px;
        border-bottom: 1px solid var(--tan-light);
        color: var(--forest);
        font-weight: 400;
        text-decoration: none;
      }

      .contact-link:hover,
      .contact-link:focus-visible {
        border-bottom-color: var(--forest);
      }

      @media (max-width: 640px) {
        .card {
          padding: 36px 22px;
        }

        .brand {
          align-items: flex-start;
        }

        .brand-wordmark {
          font-size: 1.7rem;
        }

        .brand-tagline {
          letter-spacing: 2px;
          gap: 8px;
          font-size: 9px;
        }

        .brand-rule {
          width: 22px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="circle-solid" aria-hidden="true"></div>
      <div class="circle-outline" aria-hidden="true"></div>

      <main class="card">
        <div class="brand" aria-label="Sidecar Advisory">
          <svg class="brand-icon" viewBox="0 0 52 40" aria-hidden="true">
            <circle cx="12" cy="30" r="6.5" />
            <circle cx="40" cy="30" r="6.5" />
            <path d="M18.5 30H30.5C34 30 36.5 27.5 36.5 24V21.5C36.5 18.5 34.5 16 31.5 16H24.5L19 20.5H14" />
            <path d="M26 10V24" stroke-dasharray="1 4" />
          </svg>
          <span class="brand-text">
            <span class="brand-wordmark">Sidecar Advisory</span>
            <span class="brand-tagline">
              <span class="brand-rule" aria-hidden="true"></span>
              <span>AI-POWERED BUSINESS GROWTH</span>
              <span class="brand-rule" aria-hidden="true"></span>
            </span>
          </span>
        </div>

        <p class="eyebrow">Website Coming Soon</p>
        <h1>We’re getting things ready.</h1>
        <p>
          Sidecar Advisory is preparing a new website for Metro Detroit professional service firms
          and small businesses. The public site will be live soon.
        </p>
        <a class="contact-link" href="mailto:hello@sidecaradvisory.com?subject=Website Inquiry">
          hello@sidecaradvisory.com
        </a>
        <p class="meta">Metro Detroit, MI</p>
      </main>
    </div>
  </body>
</html>
